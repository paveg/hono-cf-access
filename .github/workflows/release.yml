name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          # Node 24 ships with npm 11.x (required for OIDC Trusted Publishing).
          # Node 22 ships with npm 10.x and self-upgrading via 'npm install -g npm@latest' is unreliable in CI.
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@v1
        id: changesets
        with:
          publish: pnpm release
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Ensure GitHub Release for current version
        # Runs only after changesets/action actually publishes to npm.
        # Without this guard, the step also fires on Version Packages PR
        # update runs because changesets/action's `version` mode internally
        # invokes `pnpm version-packages` — which bumps the working-tree
        # `package.json` even though the bump is never committed to main.
        # The dirty working copy then makes `jq -r '.version'` return the
        # next (unreleased) version, creating a phantom GitHub Release tag
        # at main HEAD (the v0.5.0/e3eb594 incident on 2026-05-02).
        #
        # `outputs.published == 'true'` is set only when `pnpm release`
        # succeeds, which is exactly the situation where a corresponding
        # GitHub Release should exist. The step remains idempotent for
        # cases where changesets/action's own GitHub Release creation
        # races or is skipped — see the v0.3.0 incident for the original
        # motivation.
        #
        # Security: all shell inputs come from the repository (package.json,
        # CHANGELOG.md) or trusted env vars (GITHUB_SHA). No untrusted
        # github.event.* data is interpolated into the run block.
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r '.version' package.json)
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi
          # Extract this version's changelog section: lines between "## VERSION"
          # and the next "## " header.
          awk -v ver="## $VERSION" '
            $0 == ver { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ -s /tmp/release-notes.md ]; then
            gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --notes-file /tmp/release-notes.md
          else
            echo "No CHANGELOG section found for $VERSION; falling back to auto-generated notes."
            gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --generate-notes
          fi
      - name: Set ci-pass status on Version Packages PR
        if: steps.changesets.outputs.pullRequestNumber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          sleep 5
          PR_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          gh api "repos/${{ github.repository }}/statuses/${PR_SHA}" \
            -f state=success \
            -f context=ci-pass \
            -f description="Version Packages PR — source already verified on main"
          # Retry if SHA changed due to API eventual consistency
          sleep 5
          NEW_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          if [ "$NEW_SHA" != "$PR_SHA" ]; then
            gh api "repos/${{ github.repository }}/statuses/${NEW_SHA}" \
              -f state=success \
              -f context=ci-pass \
              -f description="Version Packages PR — source already verified on main"
          fi
